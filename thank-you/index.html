<!doctype html>
<html lang="he" dir="rtl">
<head>

  <title>תודה | Leadaro</title>
  <meta name="description" content="תודה שפנית ל־Leadaro.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://leadaro.org/thank-you">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="/" aria-label="Leadaro">
        <span class="brand-mark">L</span>
        <span>Leadaro</span>
      </a>
    </div>
  </header>

  <main class="thank-you">
    <div class="container legal-content">
      <p class="eyebrow">הפרטים התקבלו.</p>
      <h1>תודה, קיבלנו את הפנייה.</h1>
      <p class="section-lead">אם יש התאמה ראשונית, נחזור אליך לגבי בדיקת Leadaro. אפשר גם לפנות ישירות בוואטסאפ.</p>
      <div class="cta-row">
        <a class="button button-primary" href="#" data-whatsapp-link data-location="thank_you">דבר איתי בוואטסאפ</a>
        <a class="button button-secondary" href="/">חזרה לעמוד הבית</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>© Leadaro</span>
      <div class="footer-links">
        <a href="/privacy">מדיניות פרטיות</a>
        <a href="/terms">תנאי שימוש</a>
      </div>
    </div>
  </footer>

  <div class="cookie-banner" data-cookie-banner hidden>
    <div class="cookie-inner">
      <p>אנחנו משתמשים בכלי מדידה לא חיוניים רק לאחר הסכמה, כדי להבין איך האתר עובד ולשפר אותו.</p>
      <div class="cookie-actions">
        <button class="button button-primary button-small" type="button" data-cookie-accept>מאשר</button>
        <button class="button button-secondary button-small" type="button" data-cookie-reject>לא עכשיו</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/site.js"></script>
