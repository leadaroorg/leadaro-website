<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>עמוד לא נמצא | Leadaro</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&family=Inter:wght@500;600&family=JetBrains+Mono:wght@500&display=swap">
  <style>
    :root{--bg:#F4F1EA;--surface:#FFFFFF;--ink:#161412;--muted:#625D55;--border:#D8D0C2;--primary:#1E2A38;--accent:#B08A4A;--ff-sans:"Heebo",system-ui,sans-serif;--ff-latin:"Inter",system-ui,sans-serif;--ff-mono:"JetBrains Mono",ui-monospace,monospace}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--ink);font-family:var(--ff-sans);line-height:1.6}.wrap{width:min(680px,calc(100% - 40px));border:1px solid var(--border);background:var(--surface);padding:36px}.logo{direction:ltr;display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:var(--ink)}.logo__mark svg{display:block}.logo__text{display:inline-flex;flex-direction:column;align-items:flex-start;gap:2px}.logo__wordmark{font-family:var(--ff-latin);font-weight:600;font-size:20px;letter-spacing:-.01em;line-height:1}.logo__rule{display:block;width:100%;height:1px;background:var(--border);margin:2px 0}.logo__tag{font-family:var(--ff-mono);font-size:10px;color:var(--muted);letter-spacing:.04em;line-height:1}h1{font-size:38px;line-height:1.1;margin:42px 0 12px}p{color:var(--muted);margin:0 0 28px}.button{display:inline-flex;align-items:center;justify-content:center;min-height:52px;padding:0 22px;border-radius:10px;background:var(--primary);color:#fff;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <main class="wrap">
    <a class="logo" href="/" aria-label="Leadaro — בדיקת לידים">
      <span class="logo__mark" aria-hidden="true">
        <svg viewBox="0 0 18 18" width="18" height="18" focusable="false">
          <rect x="0.75" y="0.75" width="16.5" height="16.5" fill="var(--bg)" stroke="var(--ink)" stroke-width="1.5" rx="2"/>
          <line x1="4" y1="7" x2="14" y2="7" stroke="var(--ink)" stroke-width="1.5"/>
          <line x1="8" y1="11" x2="14" y2="11" stroke="var(--ink)" stroke-width="1.5"/>
        </svg>
      </span>
      <span class="logo__text">
        <bdi class="logo__wordmark">Leadaro</bdi>
        <span class="logo__rule" aria-hidden="true"></span>
        <bdi class="logo__tag">AUDIT · A-PILOT</bdi>
      </span>
    </a>
    <h1>העמוד לא נמצא</h1>
    <p>הקישור שביקשת לא זמין באתר הציבורי.</p>
    <a class="button" href="/">חזרה לדף הבית</a>
  </main>
</body>
</html>
